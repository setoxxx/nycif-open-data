<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NYC In Focus Open Data Map</title>
<link href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" rel="stylesheet">
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#0f172a;color:#f8fafc}.wrap{max-width:1100px;margin:0 auto;padding:28px 18px}.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:18px;margin-top:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}.metric{background:#1e293b;border-radius:12px;padding:12px}code{background:#020617;padding:2px 6px;border-radius:6px}.muted{color:#cbd5e1}.warn{background:#78350f;color:#fffbeb;border:1px solid #f59e0b;border-radius:12px;padding:10px 12px;margin-top:10px}#map{height:540px;border-radius:16px;overflow:hidden;border:1px solid #334155;margin-top:16px}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.swatch{width:16px;height:16px;border-radius:4px;display:inline-block;margin-right:4px;vertical-align:-3px}
</style>
</head>
<body>
<main class="wrap">
<h1>NYC In Focus Open Data Map</h1>
<p class="muted">Static-first scaffold for NYC Open Data map layers.</p>
<section class="card">
<h2>311 Service Requests by Borough</h2>
<p>Data path: <code>../aggregates/311_service_requests/borough/all.json</code></p>
<div id="status" class="muted">Checking data...</div>
<div id="warning"></div>
<div id="counts" class="grid"></div>
<div class="legend"><span><i class="swatch" style="background:#dbeafe"></i>lower</span><span><i class="swatch" style="background:#60a5fa"></i>middle</span><span><i class="swatch" style="background:#1d4ed8"></i>higher</span></div>
<div id="map"></div>
</section>
</main>
<script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
<script>
const statusEl=document.getElementById('status');
const warningEl=document.getElementById('warning');
const countsEl=document.getElementById('counts');
const map=new maplibregl.Map({container:'map',style:{version:8,sources:{base:{type:'raster',tiles:['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap © CARTO'}},layers:[{id:'base',type:'raster',source:'base'}]},center:[-73.95,40.72],zoom:9});
function color(value,max){if(!max)return '#dbeafe';const p=value/max;return p>.66?'#1d4ed8':p>.33?'#60a5fa':'#dbeafe';}
function addMap(geo,counts){const max=Math.max(...Object.values(counts).map(Number),0);geo.features.forEach(f=>{const id=f.properties.id;f.properties.count=Number(counts[id]||0);f.properties.fill=color(f.properties.count,max);});map.addSource('boroughs',{type:'geojson',data:geo});map.addLayer({id:'borough-fill',type:'fill',source:'boroughs',paint:{'fill-color':['get','fill'],'fill-opacity':0.72}});map.addLayer({id:'borough-line',type:'line',source:'boroughs',paint:{'line-color':'#0f172a','line-width':1.5}});map.on('click','borough-fill',e=>{const p=e.features[0].properties;new maplibregl.Popup().setLngLat(e.lngLat).setHTML(`<strong>${p.name}</strong><br>${Number(p.count||0).toLocaleString()} requests`).addTo(map);});}
Promise.all([
  fetch('../boundaries/boroughs.geojson').then(r=>r.json()),
  fetch('../aggregates/311_service_requests/borough/all.json').then(r=>{if(!r.ok)throw new Error('missing aggregate');return r.json();})
]).then(([geo,data])=>{
  const counts=data.counts||{};
  const sample=data.development_sample||data.status==='development_sample';
  warningEl.innerHTML=sample?`<div class="warn">Development sample only. Replace before public launch with live NYC Open Data output.</div>`:'';
  countsEl.innerHTML=Object.entries(counts).map(([k,v])=>`<div class="metric"><strong>${k}</strong><br>${Number(v).toLocaleString()} requests</div>`).join('');
  statusEl.textContent=sample?'Loaded development sample aggregate.':'Loaded aggregate generated at '+(data.generated_at||'unknown time')+'.';
  map.on('load',()=>addMap(geo,counts));
}).catch(()=>{statusEl.textContent='Aggregate file not generated yet. Trigger the refresh workflow or run: python scripts/aggregate.py --dataset 311_service_requests';map.on('load',()=>fetch('../boundaries/boroughs.geojson').then(r=>r.json()).then(geo=>{map.addSource('boroughs',{type:'geojson',data:geo});map.addLayer({id:'borough-line',type:'line',source:'boroughs',paint:{'line-color':'#1d4ed8','line-width':2}});}));});
</script>
</body>
</html>

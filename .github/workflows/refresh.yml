name: Refresh NYC Open Data aggregates

on:
  workflow_dispatch:
  schedule:
    - cron: "23 9 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate scaffold
        run: python scripts/validate_project.py

      - name: Refresh aggregate if full script exists
        run: |
          if [[ -f scripts/aggregate.py ]]; then
            python scripts/aggregate.py --dataset 311_service_requests
          else
            echo "Full aggregate script not present yet; scaffold validation only."
          fi

      - name: Validate after refresh
        run: python scripts/validate_project.py

      - name: Commit generated files
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add aggregates catalog boundaries
            git commit -m "Refresh generated data"
            git push
          else
            echo "No generated changes to commit."
          fi

name: Refresh NYC Open Data aggregates

on:
  workflow_dispatch:
  schedule:
    - cron: "23 9 * * *"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "catalog/**"
      - "boundaries/**"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate scaffold before refresh
        run: python scripts/validate_project.py

      - name: Refresh borough boundaries
        run: python scripts/fetch_boundaries.py --boundary boroughs --out boundaries

      - name: Refresh 311 borough aggregate
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: python scripts/aggregate.py --dataset 311_service_requests

      - name: Validate scaffold after refresh
        run: python scripts/validate_project.py

      - name: Commit generated files
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add aggregates catalog boundaries
            git commit -m "Refresh generated data"
            git push
          else
            echo "No generated changes to commit."
          fi

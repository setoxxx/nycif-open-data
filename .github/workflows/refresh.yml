name: Refresh NYC Open Data aggregates

on:
  workflow_dispatch:
  schedule:
    - cron: "23 9 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate scaffold before refresh
        run: python scripts/validate_project.py

      - name: Refresh 311 borough aggregate
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: python scripts/aggregate.py --dataset 311_service_requests

      - name: Validate scaffold after refresh
        run: python scripts/validate_project.py

      - name: Commit updated aggregates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add aggregates catalog
            git commit -m "Refresh NYC Open Data aggregates"
            git push
          else
            echo "No aggregate changes to commit."
          fi
